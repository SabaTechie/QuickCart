<body>
  <header><header>
  <nav class="navbar">
    <div class="logo">My Store</div>

  
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="cart.html">
        Cart (<span id="cart-count">0</span>)
      </a>
      <a href="login.html" id="auth-link">Login</a>
    </div>
  </nav>
</header></header>

<link rel="stylesheet" href="style.css">

<div class="auth-container">

  <div class="auth-card">
    <h2>Create Account</h2>

    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Enter username">

    <label for="fullname">Full Name</label>
    <input id="fullname" type="text" placeholder="Enter full name">

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="Enter email">

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password">

    <label for="confirmPassword">Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="Confirm password">

    <button class="auth-btn" onclick="signup()">Create Account</button>

    <p class="switch">
      Have an account? <a href="login.html">Login</a>
    </p>
  </div>

</div>

<script src="script.js"></script>
</body>
