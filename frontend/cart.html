</head>
<body class="no-search">

      />

    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="cart.html">

<div id="cart-items"></div>

  Proceed to Checkout
</button>
</div>

<script src="script.js"></script>

</html>
